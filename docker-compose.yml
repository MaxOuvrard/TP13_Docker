services:
  cat:
    image: localhost:5000/mon-api:1.0.0
    environment:
      - PET=${PET_CAT}
      - PORT=${API_PORT}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT}/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  dog:
    image: localhost:5000/mon-api:1.0.0
    environment:
      - PET=${PET_DOG}
      - PORT=${API_PORT}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${API_PORT}/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      cat:
        condition: service_healthy
      dog:
        condition: service_healthy
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
